// ─── HELPERS ───────────────────────────────────────────────────────
function lundi(off){
  const n=new Date(),d=n.getDay();
  const l=new Date(n);l.setDate(n.getDate()-d+(d===0?-6:1)+off*7);l.setHours(0,0,0,0);return l;
}
function fmtD(d){return d.toLocaleDateString('fr-CA',{month:'short',day:'numeric'});}
function semLabel(off){const l=lundi(off);const r=new Date(l);r.setDate(r.getDate()+6);return fmtD(l)+' – '+fmtD(r);}
function partiesSem(off){
  const l=lundi(off),r=new Date(l);r.setDate(r.getDate()+7);
  return PARTIES_LLA.filter(p=>{const d=new Date(p.date+'T00:00:00');return d>=l&&d<r;})
    .sort((a,b)=>(a.date+a.heure).localeCompare(b.date+b.heure));
}
function semIndex(off){const l=lundi(off),base=new Date('2026-05-11T00:00:00');return Math.max(0,Math.floor((l-base)/(7*864e5)));}
function semKey(off){return 'sem'+semIndex(off);}
function membresArr(){return Object.entries(membres).map(([id,m])=>({...m,id}));}
function getOrdre(role,off){
  const list=membresArr().filter(m=>m.role===role).sort((a,b)=>a.createdAt-b.createdAt);
  if(!list.length)return[];
  const n=list.length,si=semIndex(off)%n;
  return Array.from({length:n},(_,i)=>list[(si+i)%n]);
}
function currentTurnIdx(role,off){
  const sk=semKey(off),ds=draftStatus[role]||{};
  return ds[sk]?.currentTurn||0;
}
function myRankInDraft(off){
  const moi=membres[MY_ID]; if(!moi)return -1;
  const ordre=getOrdre(moi.role,off);
  return ordre.findIndex(x=>x.id===MY_ID);
}
function isMyTurn(off){
  const moi=membres[MY_ID]; if(!moi)return false;
  return myRankInDraft(off)===currentTurnIdx(moi.role,off);
}
function hasConfirmed(off){
  const moi=membres[MY_ID]; if(!moi)return false;
  const rank=myRankInDraft(off);
  return rank<currentTurnIdx(moi.role,off);
}

function buildApp(){
  const moi=membres[MY_ID];
  if(!moi){
    document.getElementById('app').style.display='block';

    return;
  }
  const isArb=moi.role==='arbitre';
  const cls=isArb?'arb':'chro';
  document.getElementById('app').style.display='block';
  document.getElementById('app').innerHTML=`
    <div class="header ${cls}">
      <div><div class="header-title">${moi.nom}</div><div class="header-sub">LLA 2026 — ${isArb?'Arbitre':'Chronométreur'} · 🔥 En ligne</div></div>
      <span class="badge-role badge-${cls}">${isArb?'Arbitre':'Chron.'}</span>
    </div>
    <div class="tabs">
      <button class="tab active" id="tab-draft" onclick="showTab('draft')">🏆 Draft</button>
      <button class="tab" id="tab-horaire" onclick="showTab('horaire')">📅 Horaire</button>
    </div>
    <div class="content">
      <div id="page-draft" class="page active"></div>
      <div id="page-horaire" class="page"></div>
    </div>`;
  renderDraftPage();
  renderHorairePage();
}

window.showTab = function(t){
  document.querySelectorAll('.tab').forEach(e=>e.classList.remove('active'));
  document.querySelectorAll('.page').forEach(e=>e.classList.remove('active'));
  document.getElementById('tab-'+t).classList.add('active');
  document.getElementById('page-'+t).classList.add('active');
};

function renderAll(){
  if(!membres[MY_ID]){ buildApp(); return; }
  const dp=document.getElementById('page-draft');
  const hp=document.getElementById('page-horaire');
  if(dp) renderDraftPage();
  if(hp) renderHorairePage();
}

// ─── DRAFT PAGE ────────────────────────────────────────────────────
function renderDraftPage(){
  const el=document.getElementById('page-draft'); if(!el)return;
  const moi=membres[MY_ID]; if(!moi)return;
  const isArb=moi.role==='arbitre'; const cls=isArb?'arb':'chro';
  const myTurn=isMyTurn(semDraft);
  const confirmed=hasConfirmed(semDraft);
  const rank=myRankInDraft(semDraft);
  const ordre=getOrdre(moi.role,semDraft);
  const curTurn=currentTurnIdx(moi.role,semDraft);
  const ps=partiesSem(semDraft);
  const myCntSem=ps.filter(p=>choix[p.id]===MY_ID).length;
  const totalChoix=Object.values(choix).filter(v=>v===MY_ID).length;

  // Banner
  let bannerHtml='';
  if(ps.length===0){
    bannerHtml=`<div class="draft-banner wait"><div class="draft-title">Aucune partie cette semaine</div><div class="draft-sub">Navigue vers une autre semaine.</div></div>`;
  } else if(confirmed){
    bannerHtml=`<div class="draft-banner done"><div class="draft-title">✅ Tu as confirmé tes choix!</div><div class="draft-sub">${myCntSem} partie${myCntSem!==1?'s':''} choisie${myCntSem!==1?'s':''} cette semaine · ${totalChoix} au total</div></div>`;
  } else if(myTurn){
    bannerHtml=`<div class="draft-banner ${cls}"><div class="draft-title" style="color:${isArb?'#0C447C':'#27500A'}">🎯 C'est ton tour de choisir!</div><div class="draft-sub">Sélectionne tes parties puis clique <strong>Confirmer mes choix</strong>.</div></div>`;
  } else {
    const tourRestant=rank-curTurn;
    const enAttente=ordre[curTurn];
    bannerHtml=`<div class="draft-banner wait"><div class="draft-title">⏳ En attente — ${tourRestant} personne${tourRestant>1?'s':''} avant toi</div><div class="draft-sub">Tu pourras choisir quand <strong>${enAttente?enAttente.nom:'...'}</strong> aura confirmé ses choix.<br>Tu peux voir les parties déjà prises ci-dessous.</div></div>`;
  }

  // Confirmer box
  let confirmBox='';
  if(myTurn && ps.length>0){
    confirmBox=`<div class="confirmer-box" id="confirm-box">
      <div style="font-size:13px;font-weight:500;margin-bottom:4px">${myCntSem} partie${myCntSem!==1?'s':''} sélectionnée${myCntSem!==1?'s':''}</div>
      <div style="font-size:12px;color:#666;margin-bottom:10px">Clique Confirmer quand tu as fini. Le prochain pourra alors faire ses choix.</div>
      <button class="btn btn-confirmer" onclick="confirmerChoix()" ${myCntSem===0?'disabled':''}>
        ✓ Confirmer mes choix
      </button>
    </div>`;
  } else if(confirmed){
    confirmBox=`<div class="confirmer-box confirmed"><div style="font-size:13px;font-weight:500;color:#27500A">✅ Choix confirmés — ${myCntSem} partie${myCntSem!==1?'s':''} cette semaine</div></div>`;
  }

  // Parties
  const grouped={};
  ps.forEach(p=>{(grouped[p.date]=grouped[p.date]||[]).push(p);});
  const partiesHtml=Object.entries(grouped).map(([date,list])=>`
    <div class="week-header">${new Date(date+'T00:00:00').toLocaleDateString('fr-CA',{weekday:'long',month:'long',day:'numeric'})}</div>
    ${list.map(p=>{
      const pris=choix[p.id];
      const estMoi=pris===MY_ID;
      const prisParAutre=pris&&pris!==MY_ID;
      const cardClass=estMoi?(isArb?'card mine':'card mine-chro'):'card';
      const canPick=myTurn&&!confirmed;
      return `<div class="${cardClass}" style="margin-bottom:6px;padding:.75rem 1rem">
        <div class="row-between">
          <div>
            <div style="font-size:13px;font-weight:500"><span class="num-badge">#${p.number}</span>${p.local} vs ${p.visiteur}</div>
            <div class="partie-sub">${p.heure}</div>
          </div>
          ${estMoi&&canPick
            ? `<button class="btn btn-sm btn-retirer" onclick="retirerChoix('${p.id}')">✕ Retirer</button>`
            : estMoi&&confirmed
              ? `<span class="badge b-mine">✓ Ma partie</span>`
              : prisParAutre
                ? `<span class="pris-badge">Déjà pris</span>`
                : canPick
                  ? `<button class="btn btn-sm btn-choisir ${cls}" onclick="choisirPartie('${p.id}')">+ Choisir</button>`
                  : `<span style="font-size:11px;color:#aaa">${pris?'Pris':'Libre'}</span>`
          }
        </div>
        ${estMoi?`<div style="font-size:11px;margin-top:4px;color:${isArb?'#185FA5':'#3B6D11'};font-weight:500">✓ Tu as choisi cette partie</div>`:''}
      </div>`;
    }).join('')}`).join('');

  el.innerHTML=`
    <div class="semaine-nav">
      <button class="btn btn-sm" onclick="changerSemDraft(-1)">←</button>
      <span class="semaine-label">${semLabel(semDraft)}</span>
      <button class="btn btn-sm" onclick="changerSemDraft(1)">→</button>
    </div>
    ${bannerHtml}
    ${confirmBox}
    ${ps.length?partiesHtml:''}`;
}

window.choisirPartie = async function(pid){
  if(!isMyTurn(semDraft)){return;}
  if(choix[pid]&&choix[pid]!==MY_ID){alert('Cette partie vient d\'être prise!');return;}
  await set(ref(db,`choix/${pid}`),MY_ID);
};

window.retirerChoix = async function(pid){
  if(!isMyTurn(semDraft))return;
  await remove(ref(db,`choix/${pid}`));
};

window.confirmerChoix = async function(){
  const moi=membres[MY_ID]; if(!moi)return;
  const rank=myRankInDraft(semDraft);
  const sk=semKey(semDraft);
  const curTurn=currentTurnIdx(moi.role,semDraft);
  if(rank!==curTurn)return;
  const ordre=getOrdre(moi.role,semDraft);
  const next=curTurn+1;
  await update(ref(db,`draftStatus/${moi.role}`),{[sk]:{currentTurn:next}});
  // Si c'était le dernier → assigner les parties non choisies à admin
  if(next>=ordre.length){
    const ps=partiesSem(semDraft);
    const updates={};
    ps.forEach(p=>{
      const preneurId=choix[p.id];
      const preneur=preneurId?membresArr().find(x=>x.id===preneurId):null;
      if(!preneurId||!preneur){
        updates['choix/'+p.id]='admin_'+moi.role;
      }
    });
    if(Object.keys(updates).length) await update(ref(db),updates);
  }
};

window.changerSemDraft = function(d){semDraft+=d; renderDraftPage();};

// ─── HORAIRE PAGE ──────────────────────────────────────────────────
function renderHorairePage(){
  const el=document.getElementById('page-horaire'); if(!el)return;
  const moi=membres[MY_ID]; if(!moi)return;
  const isArb=moi.role==='arbitre';
  const ps=partiesSem(semHoraire);
  const grouped={};
  ps.forEach(p=>{(grouped[p.date]=grouped[p.date]||[]).push(p);});
  const partiesHtml=ps.length===0?'<div class="empty">Aucune partie cette semaine.</div>':
    Object.entries(grouped).map(([date,list])=>`
      <div class="week-header">${new Date(date+'T00:00:00').toLocaleDateString('fr-CA',{weekday:'long',month:'long',day:'numeric'})}</div>
      ${list.map(p=>{
        const estMoi=choix[p.id]===MY_ID;
        const pris=!!choix[p.id];
        const cardClass=estMoi?(isArb?'card mine':'card mine-chro'):'card';
        return `<div class="${cardClass}" style="margin-bottom:6px;padding:.75rem 1rem">
          <div class="row-between">
            <div>
              <div style="font-size:13px;font-weight:500"><span class="num-badge">#${p.number}</span>${p.local} vs ${p.visiteur}</div>
              <div class="partie-sub">${p.heure}</div>
            </div>
            ${estMoi?`<span class="badge b-mine">✓ Ma partie</span>`:choix[p.id]&&choix[p.id].startsWith('admin_')?`<span style="font-size:11px;padding:2px 7px;border-radius:20px;background:#FAEEDA;color:#633806">Admin</span>`:pris?`<span class="pris-badge">Assigné</span>`:`<span style="font-size:11px;color:#aaa">Libre</span>`}
          </div>
        </div>`;
      }).join('')}`).join('');

  el.innerHTML=`
    <div class="semaine-nav">
      <button class="btn btn-sm" onclick="changerSemH(-1)">←</button>
      <span class="semaine-label">${semLabel(semHoraire)}</span>
      <button class="btn btn-sm" onclick="changerSemH(1)">→</button>
    </div>
    <div style="font-size:12px;color:#666;margin-bottom:.875rem">Tes parties sont surlignées. Les autres sont assignées à tes collègues.</div>
    ${partiesHtml}`;
}

window.changerSemH = function(d){semHoraire+=d; renderHorairePage();};
</script>
</body>
